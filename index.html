<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prabhas Fan Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
        }

        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
            url('https://wallpapercave.com/wp/wp7250277.jpg');

            background-size: cover;
            background-position: center;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
            color: #ffcc00;
        }

        p {
            font-size: 22px;
            width: 70%;
            line-height: 1.6;
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            background: #ff9900;
            color: white;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #e68a00;
        }

        #message {
            margin-top: 20px;
            color: #00ff99;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <div class="hero">
        <h1>Prabhas</h1>

        <p>
            Rebel Star Prabhas — One of the biggest stars in Indian cinema,
            known for blockbuster movies like Baahubali, Salaar, and Kalki.
        </p>

        <button onclick="showMessage()">
            Fans Click Here
        </button>

        <p id="message"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "Jai Darling Prabhas!";
        }
    </script>

</body>
</html>
